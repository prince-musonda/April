<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>R.I.O. Core - Autonomous</title>
    <style>
      :root {
        --glow: #00d9ff;
        --bg: #000;
        --eye-w: 150px;
        --eye-h: 110px;
      }

      body {
        margin: 0;
        background: var(--bg);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: "Courier New", Courier, monospace;
        color: var(--glow);
        transition: background 0.5s ease;
      }

      /* --- INITIALIZATION SCREEN --- */
      #boot-screen {
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        letter-spacing: 2px;
      }

      .pulse-text {
        animation: text-pulse 1.5s infinite;
      }

      @keyframes text-pulse {
        0%,
        100% {
          opacity: 0.3;
        }
        50% {
          opacity: 1;
        }
      }

      /* --- EYE CONTAINER --- */
      .eye-container {
        display: flex;
        gap: 60px;
        position: relative;
        /* Constant organic drifting */
        animation: drift 10s ease-in-out infinite;
      }

      .eye {
        width: var(--eye-w);
        height: var(--eye-h);
        background: var(--glow);
        border-radius: 50% 50% 15% 15% / 70% 70% 30% 30%;
        box-shadow:
          0 0 40px var(--glow),
          inset 0 -10px 20px rgba(0, 0, 0, 0.4);
        transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      /* Sparkle for Wink */
      #sparkle {
        position: absolute;
        top: -20px;
        right: -20px;
        font-size: 30px;
        color: #ffd700;
        display: none;
        text-shadow: 0 0 10px gold;
      }

      /* --- MODE STYLES --- */

      .evil {
        --glow: #ff3333;
      }
      .evil .eye {
        height: 60px;
        border-radius: 10% 10% 50% 50% / 20% 20% 80% 80%;
        transform: translateY(20px);
      }

      .curious .eye-l {
        transform: rotate(-12deg) translateY(-10px);
      }
      .curious .eye-r {
        transform: rotate(12deg) translateY(-10px);
      }

      .sleeping .eye {
        height: 10px;
        border-radius: 5px;
        opacity: 0.6;
        box-shadow: 0 0 10px var(--glow);
      }

      .wink .eye-l {
        border-radius: 50%;
        height: var(--eye-w);
        width: var(--eye-w);
      }
      .wink .eye-r {
        height: 20px;
        border-radius: 5px;
        /* Adjust this value: higher number = lower position */
        transform: translateY(60px);
      }

      /* Judge - Flat top, squinting */
      .judgy .eye {
        height: 60px;
        border-radius: 10% 10% 50% 50% / 20% 20% 80% 80%;
        transform: translateY(20px);
      }

      /* Wondering - Tilted and slightly narrowed */
      .wondering .eye-t {
        transform: rotate(-10deg) translateY(-10px) scaleY(0.9);
      }

      /* Surprise - Round and large */
      .surprise .eye {
        border-radius: 50%;
        height: 150px;
        transform: scale(1.1);
      }

      /* --- SYSTEM ANIMATIONS --- */

      @keyframes drift {
        0%,
        100% {
          transform: translate(0, 0);
        }
        25% {
          transform: translate(10px, -5px);
        }
        75% {
          transform: translate(-10px, 5px);
        }
      }

      .blink {
        height: 2px !important;
        transform: scaleY(0) !important;
        box-shadow: none !important;
      }
    </style>
  </head>
  <body class="default">
    <div id="boot-screen" onclick="initializeRio()">
      <div class="pulse-text">[ INITIALIZE R.I.O. SYSTEM ]</div>
      <div style="font-size: 10px; margin-top: 10px; opacity: 0.5">
        CLICK TO ENTER FULLSCREEN
      </div>
    </div>

    <div class="eye-container" id="rio-core">
      <div id="sparkle">✦</div>
      <div class="eye eye-l" id="l"></div>
      <div class="eye eye-r" id="r"></div>
    </div>

    <script>
      const body = document.body;
      const sparkle = document.getElementById("sparkle");
      let autoCycleInterval;

      // 1. INITIALIZATION & FULLSCREEN
      function initializeRio() {
        // Request Fullscreen
        const doc = document.documentElement;
        if (doc.requestFullscreen) doc.requestFullscreen();
        else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();

        // Hide boot screen and start autonomous behavior
        document.getElementById("boot-screen").style.display = "none";

        startAutonomousCycle();
        startBlinking();
      }

      // 2. INDIVIDUAL MODE FUNCTIONS (Call these anytime)

      function modeDefault() {
        body.className = "default";
        sparkle.style.display = "none";
      }

      function modeEvil() {
        body.className = "evil";
        sparkle.style.display = "none";
      }

      function modeCurious() {
        body.className = "curious";
        sparkle.style.display = "none";
      }

      function modeSleeping() {
        body.className = "sleeping";
        sparkle.style.display = "none";
      }

      function modeJudgy() {
        body.className = "judgy";
        sparkle.style.display = "none";
      }

      function modeWonder() {
        body.className = "wondering";
        sparkle.style.display = "none";
      }

      function modeSurprise() {
        body.className = "surprise";
        sparkle.style.display = "none";
      }

      function modeWink() {
        body.className = "wink";
        sparkle.style.display = "block";
      }

      // 3. AUTONOMOUS BEHAVIOR
      function startAutonomousCycle() {
        const modes = [
          modeDefault,
          modeCurious,
          modeEvil,
          modeDefault,
          modeWink,
          modeSleeping,
          modeWonder,
          modeJudgy,
          modeSurprise,
        ];
        let index = 0;

        autoCycleInterval = setInterval(() => {
          modes[index]();
          index = (index + 1) % modes.length;
        }, 5000); // Switches every 5 seconds
      }

      function startBlinking() {
        setInterval(
          () => {
            // Don't blink if sleeping
            if (body.className.includes("sleeping")) return;

            const eyes = document.querySelectorAll(".eye");
            eyes.forEach((e) => e.classList.add("blink"));

            setTimeout(() => {
              eyes.forEach((e) => e.classList.remove("blink"));
            }, 150);
          },
          Math.random() * 4000 + 2000,
        );
      }
    </script>
  </body>
</html>
